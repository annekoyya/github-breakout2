name: Deploy GitHub Breakout Game

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight
  workflow_dispatch:     # Allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Fetch GitHub contributions
        run: |
          mkdir -p game/data
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "query { user(login: \"${{ github.repository_owner }}\") { contributionsCollection(from: \"'$(date -d "365 days ago" +%Y-%m-%d)'T00:00:00Z\" to: \"'$(date +%Y-%m-%d)'T23:59:59Z\") { contributionCalendar { totalContributions weeks { contributionDays { contributionCount date } } } } } }"}' \
            https://api.github.com/graphql > contributions_raw.json
          
          # Parse and format the contributions data
          node -e "
            const data = require('./contributions_raw.json');
            const days = data.data.user.contributionsCollection.contributionCalendar.weeks
              .flatMap(w => w.contributionDays)
              .map(d => ({ date: d.date, count: d.contributionCount }));
            require('fs').writeFileSync('game/data/contributions.json', JSON.stringify(days));
          "
      
      - name: Commit contributions data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add game/data/contributions.json
          git diff --staged --quiet || git commit -m "Update contributions data [skip ci]"
          git push
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./game
          publish_branch: gh-pages
          force_orphan: true
