name: Deploy GitHub Breakout Game

on:
  schedule:
    - cron: "0 0 * * *"       # Refresh contribution data daily
  workflow_dispatch:            # Run manually from Actions tab
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Fetch contribution data from GitHub GraphQL API ──
      - name: Fetch contribution data
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os

          username = os.environ.get("GITHUB_REPOSITORY_OWNER", "")
          token    = os.environ.get("GITHUB_TOKEN", "")

          query = """
          query($u: String!) {
            user(login: $u) {
              contributionsCollection {
                contributionCalendar {
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          """

          payload = json.dumps({"query": query, "variables": {"u": username}}).encode()
          req = urllib.request.Request(
              "https://api.github.com/graphql",
              data=payload,
              headers={
                  "Authorization": f"bearer {token}",
                  "Content-Type": "application/json",
                  "User-Agent": "github-breakout/1.0",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  data = json.loads(resp.read())
              weeks = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]["weeks"]
              days = []
              for week in weeks:
                  for day in week["contributionDays"]:
                      days.append({"date": day["date"], "count": day["contributionCount"]})
              print(f"Fetched {len(days)} days for {username}")
          except Exception as e:
              print(f"Error fetching: {e} — using empty data")
              days = []

          os.makedirs("game", exist_ok=True)
          with open("game/contributions.json", "w") as f:
              json.dump({"username": username, "days": days}, f)

          print("Written game/contributions.json")
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Deploy game folder to GitHub Pages ──────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./game
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "chore: update breakout game data [skip ci]"
